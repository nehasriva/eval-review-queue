version: '3.8'

services:
  eval-review-queue:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./data:/data
    environment:
      - PORT=5001
      - DATABASE=/data/review_queue.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

